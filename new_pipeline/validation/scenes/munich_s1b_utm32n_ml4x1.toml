# Scene config: S1B Munich, 2019-01-23, UTM 32N, 10 m — 4×1 multilook
#
# Same acquisition as munich_s1b_utm32n.toml but with --multilook-range 4
# applied before terrain correction, matching the SNAP S1-IW RTC default
# (4 range × 1 azimuth looks).
#
# Reference: same ASF RTC10 product.  The multilooked sardine output is
# resampled onto the same 10-m grid by TC so pixel-level geometry is
# unchanged.
#
# Validated 2026-04-28:
#   median_bias = +0.0393 dB   (cf. no-multilook +0.0283 dB — neutral)
#   std_dev     = 2.9422 dB    (cf. no-multilook 2.9572 dB — speckle ↓)
#   n_samples   = 4,098,736

name = "munich_s1b_utm32n_ml4x1"
safe = "data/SLC/S1B_IW_SLC__1SDV_20190123T053348_20190123T053415_014617_01B3D4_E833.SAFE"
orbit = "data/SLC/S1B_IW_SLC__1SDV_20190123T053348_20190123T053415_014617_01B3D4_E833.SAFE/orbit_cache/S1B_IW_SLC__1SDV_20190123T053348_20190123T053415_014617_01B3D4_E833_POEORB.EOF"
dem = "data/dem/srtm1"
asf_reference = "data/ASF/S1B_IW_20190123T053348_DVP_RTC10_G_gpufem_6EC9/S1B_IW_20190123T053348_DVP_RTC10_G_gpufem_6EC9_VV.tif"
polarization = "VV"
crs = "auto"
pixel_spacing_m = 10.0
geoid = "zero"
extra_sardine_args = ["--multilook-range", "4"]

[thresholds]
# Same median gate as the no-multilook run; multilook is radiometrically
# neutral so the bias should not change.  Observed +0.0393 dB.
median_bias_db_max = 0.10

# Observed 2.9422 dB (vs 2.9572 dB no-multilook).  Gate at 3.50 dB.
std_dev_db_max = 3.50

# Floor unchanged.
min_joint_samples = 1_000_000
